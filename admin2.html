<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salon Admin Calendar</title>
  <style>
    :root {
      --bg: #456b62;
      --bg-dark: #2f5b57;
      --panel: rgba(255,255,255,0.08);
      --panel-strong: rgba(255,255,255,0.12);
      --card: #f3f1ef;
      --text: #ffffff;
      --text-dark: #1b1f1e;
      --accent: #e3ad78;
      --accent-soft: #f6e0c8;
      --muted: rgba(255,255,255,0.74);
      --line: rgba(255,255,255,0.12);
      --success: #cfe9d2;
      --info: #d8e7ff;
      --shadow: 0 18px 44px rgba(0,0,0,0.2);
      --danger-soft: #ffe0e0;
      --new: #ffd966;
      --new-border: #e3ad78;
      --new-bg: #fff8ef;
      --done-bg: #e8f6ea;
      --done-border: #79b88a;
      --cancel-bg: #fff0f0;
      --cancel-border: #d98d8d;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-dark);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
      padding: 20px 16px 32px;
      background:
        radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(180deg, #456b62 0%, #2f5b57 100%);
      background-size: 20px 20px, auto;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      line-height: 1.1;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .topbar-right {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .mode-switch {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 4px;
      gap: 4px;
      min-width: 120px;
      flex-shrink: 0;
    }

    .mode-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      background: transparent;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .mode-btn.active {
      background: var(--accent);
      color: #000;
    }

    .auto-refresh-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .toggle-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
    }

    .toggle-switch {
      position: relative;
      width: 48px;
      height: 28px;
      display: inline-block;
      flex: 0 0 auto;
    }

    .toggle-switch input {
      display: none;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.22);
      cursor: pointer;
      transition: 0.2s ease;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      transition: 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .toggle-switch input:checked + .toggle-slider {
      background: var(--accent);
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .quick-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 10px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .quick-btn.primary {
      background: var(--accent);
      color: #000;
    }

    .filters {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field,
    .select {
      width: 100%;
      padding: 16px 14px;
      border-radius: 16px;
      border: none;
      background: #fff;
      color: #000;
      font-size: 15px;
      font-weight: 700;
      appearance: none;
      -webkit-appearance: none;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-card {
      background: var(--panel);
      border-radius: 18px;
      padding: 14px;
      border: 1px solid var(--line);
      box-shadow: 0 10px 24px rgba(0,0,0,0.10);
    }

    .summary-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .summary-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 0 18px;
    }

    .legend-chip {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    .legend-chip.accent {
      background: var(--accent);
      color: #000;
    }

    .legend-chip.info {
      background: rgba(255,255,255,0.14);
    }

    .legend-chip.done {
      background: #dff3e3;
      color: #1f4a2b;
    }

    .legend-chip.cancel {
      background: #ffe4e4;
      color: #7f2f2f;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
    }

    .live-badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9cffb4;
      box-shadow: 0 0 0 0 rgba(156,255,180,.5);
      animation: pulseLive 1.8s infinite;
    }

    .live-badge.off {
      opacity: 0.75;
    }

    .live-badge.off::before {
      background: #d6d6d6;
      animation: none;
      box-shadow: none;
    }

    @keyframes pulseLive {
      0% { box-shadow: 0 0 0 0 rgba(156,255,180,.5); }
      70% { box-shadow: 0 0 0 10px rgba(156,255,180,0); }
      100% { box-shadow: 0 0 0 0 rgba(156,255,180,0); }
    }

    .section-day {
      margin-bottom: 16px;
    }

    .day-title {
      display: inline-block;
      margin: 0 0 12px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      font-size: 14px;
      font-weight: 800;
    }

    .master-section {
      margin-bottom: 18px;
      border-radius: 22px;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      box-shadow: 0 10px 24px rgba(0,0,0,0.10);
    }

    .master-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid var(--line);
    }

    .master-photo {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      background: #ddd;
      flex-shrink: 0;
    }

    .master-name {
      font-size: 18px;
      font-weight: 800;
      margin: 0;
    }

    .master-sub {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .master-count {
      margin-left: auto;
      background: var(--accent);
      color: #000;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .booking-list {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .booking-card {
      background: #fff;
      color: #000;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease, opacity 0.2s ease;
      border: 2px solid transparent;
    }

    .booking-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.15);
    }

    .booking-card.new {
      border-color: var(--new-border);
      background: var(--new-bg);
      animation: newPulse 1.2s ease;
    }

    .booking-card.status-completed {
      background: var(--done-bg);
      border-color: var(--done-border);
    }

    .booking-card.status-cancelled {
      background: var(--cancel-bg);
      border-color: var(--cancel-border);
      opacity: 0.92;
    }

    @keyframes newPulse {
      0% {
        transform: scale(0.985);
        box-shadow: 0 0 0 rgba(227,173,120,0);
      }
      40% {
        transform: scale(1.01);
        box-shadow: 0 0 0 8px rgba(227,173,120,0.16);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      }
    }

    .booking-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      align-items: flex-start;
    }

    .booking-time {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.1;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .booking-duration {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .booking-service {
      background: var(--accent-soft);
      color: #000;
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      max-width: 52%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .booking-badge-new {
      background: var(--new);
      color: #000;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .booking-row {
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .booking-row:last-child {
      margin-bottom: 0;
    }

    .booking-row span {
      color: #666;
    }

    .booking-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .booking-status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--success);
      font-size: 12px;
      font-weight: 800;
    }

    .booking-status.completed {
      background: #cfe9d2;
      color: #214a2b;
    }

    .booking-status.cancelled {
      background: #ffdede;
      color: #7d2a2a;
    }

    .booking-status.booked {
      background: var(--success);
      color: #16342e;
    }

    .booking-date-chip {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--info);
      font-size: 12px;
      font-weight: 800;
      color: #000;
    }

    .booking-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .action-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    .action-btn:hover {
      transform: translateY(-1px);
    }

    .action-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .action-btn.complete {
      background: #dff3e3;
      color: #1f4a2b;
    }

    .action-btn.cancel {
      background: #ffe4e4;
      color: #7f2f2f;
    }

    .action-btn.restore {
      background: #d8e7ff;
      color: #1b3f78;
    }

    .empty-box {
      margin-top: 24px;
      background: rgba(255,255,255,0.08);
      border: 1px dashed var(--line);
      border-radius: 20px;
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 1200;
      background: rgba(255,255,255,0.96);
      color: #000;
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.18);
      border-left: 5px solid var(--accent);
      min-width: 220px;
      max-width: 320px;
      display: none;
    }

    .toast.show {
      display: block;
      animation: toastIn .25s ease;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .toast-title {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .toast-text {
      font-size: 13px;
      color: #555;
      line-height: 1.45;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(23,35,33,0.56);
      backdrop-filter: blur(8px);
      z-index: 1000;
      padding: 20px;
    }

    .loading-overlay.active {
      display: flex;
    }

    .loading-card {
      width: 100%;
      max-width: 280px;
      padding: 28px 22px;
      border-radius: 24px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      text-align: center;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }

    .loading-spinner {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: var(--accent);
      margin: 0 auto 14px;
      animation: spin 0.8s linear infinite;
    }

    .loading-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .loading-text {
      font-size: 13px;
      color: var(--muted);
    }

    .skeleton-section {
      display: grid;
      gap: 14px;
      margin-top: 8px;
    }

    .skeleton-card {
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 16px;
    }

    .skeleton-line {
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0.07), rgba(255,255,255,0.18), rgba(255,255,255,0.07));
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite linear;
      margin-bottom: 10px;
    }

    .skeleton-line:last-child {
      margin-bottom: 0;
    }

    .w-30 { width: 30%; }
    .w-40 { width: 40%; }
    .w-50 { width: 50%; }
    .w-60 { width: 60%; }
    .w-80 { width: 80%; }
    .w-100 { width: 100%; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 639px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .filter-row {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
      }

      .topbar-right {
        width: 100%;
        align-items: stretch;
      }

      .auto-refresh-row {
        justify-content: flex-start;
      }

      .quick-actions {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (min-width: 640px) and (max-width: 1023px) {
      body {
        padding: 18px;
      }

      .app {
        max-width: 860px;
        margin: 0 auto;
        border-radius: 28px;
        box-shadow: var(--shadow);
      }

      .summary-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .quick-actions {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (min-width: 1024px) {
      body {
        padding: 24px;
      }

      .app {
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 24px;
      }

      #calendarContainer.grid-layout {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
        align-items: start;
      }

      .section-day {
        margin-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay active">
    <div class="loading-card">
      <div class="loading-spinner"></div>
      <div class="loading-title">読み込み中...</div>
      <div class="loading-text">予約データを準備しています</div>
    </div>
  </div>

  <div id="toast" class="toast" aria-live="polite">
    <div class="toast-title">通知</div>
    <div class="toast-text" id="toastText">予約データが更新されました</div>
  </div>

  <div class="app">
    <div class="topbar">
      <div>
        <h1 class="title">予約カレンダー</h1>
        <p class="subtitle">担当者ごとの予約状況を確認できます</p>
      </div>

      <div class="topbar-right">
        <div class="mode-switch">
          <button class="mode-btn active" id="modeDayBtn" type="button">日</button>
          <button class="mode-btn" id="modeWeekBtn" type="button">週</button>
        </div>

        <div class="auto-refresh-row">
          <div class="toggle-wrap">
            <span>AUTO更新</span>
            <label class="toggle-switch">
              <input type="checkbox" id="autoRefreshToggle" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="quick-actions">
      <button class="quick-btn primary" type="button" id="todayBtn">今日</button>
      <button class="quick-btn" type="button" id="tomorrowBtn">明日</button>
      <button class="quick-btn" type="button" id="thisWeekBtn">今週</button>
      <button class="quick-btn" type="button" id="refreshBtn">更新</button>
    </div>

    <div class="filters">
      <input type="date" id="selectedDate" class="field" />

      <div class="filter-row">
        <select id="staffFilter" class="select">
          <option value="">全スタッフ</option>
        </select>

        <select id="serviceFilter" class="select">
          <option value="">全サービス</option>
        </select>
      </div>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">予約件数</div>
        <div class="summary-value" id="bookingCount">0</div>
      </div>

      <div class="summary-card">
        <div class="summary-label">稼働スタッフ</div>
        <div class="summary-value" id="staffCount">0</div>
      </div>

      <div class="summary-card">
        <div class="summary-label">平均所要時間</div>
        <div class="summary-value" id="avgDuration">0分</div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-chip accent">今日の表示</div>
      <div class="legend-chip">スタッフ別</div>
      <div class="legend-chip">サービス絞り込み</div>
      <div class="legend-chip info" id="modeLabel">日表示</div>
      <div class="legend-chip done">完了</div>
      <div class="legend-chip cancel">キャンセル</div>
      <div class="live-badge" id="liveBadge">AUTO更新</div>
    </div>

    <div class="status-bar">
      <div><span class="status-dot"></span><span id="lastUpdated">最終更新: --</span></div>
      <div id="rangeLabel">表示範囲: --</div>
    </div>

    <div id="calendarContainer">
      <div class="skeleton-section" id="skeletonBlock">
        <div class="skeleton-card">
          <div class="skeleton-line w-40"></div>
          <div class="skeleton-line w-100"></div>
          <div class="skeleton-line w-80"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-line w-30"></div>
          <div class="skeleton-line w-100"></div>
          <div class="skeleton-line w-60"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CONFIG = {
      WEBHOOK_URL: "https://script.google.com/macros/s/AKfycbz8zBVqcxOQE-fRYh3Cc44DWPBb_vVNTnaQoQ4vgQNyYsPbKAEmhsiBHJC_VMbZVP0P/exec",
      CACHE_TTL_MS: 3 * 60 * 1000,
      AUTO_REFRESH_MS: 15000,
      NEW_BADGE_MS: 120000,
      SOUND_ENABLED: false
    };

    const CALENDAR_URL = `${CONFIG.WEBHOOK_URL}?action=calendar`;
    const STAFF_URL = `${CONFIG.WEBHOOK_URL}?action=staff`;
    const SERVICES_URL = `${CONFIG.WEBHOOK_URL}?action=services`;

    let calendarItems = [];
    let staff = [];
    let services = [];
    let currentMode = "day";

    let lastCalendarHash = "";
    let knownBookingIds = new Set();
    let firstAutoLoadDone = false;
    let isUpdatingStatus = false;
    let autoRefreshEnabled = true;
    let autoRefreshTimer = null;

    const cacheStore = {
      calendar: { data: null, ts: 0 },
      staff: { data: null, ts: 0 },
      services: { data: null, ts: 0 }
    };

    const audio = CONFIG.SOUND_ENABLED
      ? new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")
      : null;

    async function init() {
      const dateInput = document.getElementById("selectedDate");
      const autoRefreshToggle = document.getElementById("autoRefreshToggle");

      dateInput.value = getToday();
      autoRefreshToggle.checked = autoRefreshEnabled;

      document.getElementById("modeDayBtn").addEventListener("click", () => switchMode("day"));
      document.getElementById("modeWeekBtn").addEventListener("click", () => switchMode("week"));

      dateInput.addEventListener("change", renderCalendar);
      document.getElementById("staffFilter").addEventListener("change", renderCalendar);
      document.getElementById("serviceFilter").addEventListener("change", renderCalendar);

      autoRefreshToggle.addEventListener("change", () => {
        autoRefreshEnabled = autoRefreshToggle.checked;
        updateLiveBadge();
        restartAutoRefresh();

        if (autoRefreshEnabled) {
          showToast("AUTO更新をONにしました");
        } else {
          showToast("AUTO更新をOFFにしました");
        }
      });

      document.addEventListener("visibilitychange", async () => {
        if (document.hidden) return;
        if (autoRefreshEnabled && !isUpdatingStatus) {
          await silentAutoRefresh(true);
        }
      });

      document.getElementById("todayBtn").addEventListener("click", () => {
        dateInput.value = getToday();
        currentMode = "day";
        syncModeButtons();
        renderCalendar();
      });

      document.getElementById("tomorrowBtn").addEventListener("click", () => {
        dateInput.value = getRelativeDate(1);
        currentMode = "day";
        syncModeButtons();
        renderCalendar();
      });

      document.getElementById("thisWeekBtn").addEventListener("click", () => {
        dateInput.value = getToday();
        currentMode = "week";
        syncModeButtons();
        renderCalendar();
      });

      document.getElementById("refreshBtn").addEventListener("click", async () => {
        await refreshAllData(true);
      });

      setLoading(true, "読み込み中...", "予約データを準備しています");

      try {
        await Promise.all([
          loadCalendar(true),
          loadStaff(true),
          loadServices(true)
        ]);

        fillFilters();
        initializeKnownBookings(calendarItems);
        lastCalendarHash = generateHash(calendarItems);

        renderCalendar();
        updateLastUpdated();
        syncModeButtons();
        updateLiveBadge();

        firstAutoLoadDone = true;
        restartAutoRefresh();
      } catch (err) {
        console.log("init error:", err);
        renderErrorState("データの読み込みに失敗しました");
      } finally {
        setLoading(false);
      }
    }

    function setLoading(show, title = "読み込み中...", text = "少々お待ちください") {
      const overlay = document.getElementById("loadingOverlay");
      if (!overlay) return;

      const titleEl = overlay.querySelector(".loading-title");
      const textEl = overlay.querySelector(".loading-text");

      if (titleEl) titleEl.textContent = title;
      if (textEl) textEl.textContent = text;

      overlay.classList.toggle("active", !!show);
    }

    function getCache(key) {
      const item = cacheStore[key];
      if (!item || !item.data) return null;
      if (Date.now() - item.ts > CONFIG.CACHE_TTL_MS) return null;
      return item.data;
    }

    function setCache(key, data) {
      cacheStore[key] = {
        data: Array.isArray(data) ? deepClone(data) : data,
        ts: Date.now()
      };
    }

    async function fetchJson(url, options = {}) {
      const method = (options.method || "GET").toUpperCase();

      if (method === "GET") {
        const sep = url.includes("?") ? "&" : "?";
        url = `${url}${sep}_ts=${Date.now()}`;
      }

      const res = await fetch(url, {
        cache: "no-store",
        ...options
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    async function loadCalendar(useCache = true) {
      const cached = useCache ? getCache("calendar") : null;
      if (cached) {
        calendarItems = deepClone(cached);
        return;
      }

      calendarItems = await fetchJson(CALENDAR_URL);
      setCache("calendar", calendarItems);
    }

    async function loadStaff(useCache = true) {
      const cached = useCache ? getCache("staff") : null;
      if (cached) {
        staff = deepClone(cached);
        return;
      }

      staff = await fetchJson(STAFF_URL);
      setCache("staff", staff);
    }

    async function loadServices(useCache = true) {
      const cached = useCache ? getCache("services") : null;
      if (cached) {
        services = deepClone(cached);
        return;
      }

      services = await fetchJson(SERVICES_URL);
      setCache("services", services);
    }

    async function refreshAllData(showOverlay = false) {
      if (showOverlay) {
        setLoading(true, "更新中...", "最新の予約データを取得しています");
      }

      try {
        const oldItems = deepClone(calendarItems);

        await Promise.all([
          loadCalendar(false),
          loadStaff(false),
          loadServices(false)
        ]);

        fillFilters(true);
        detectNewBookings(oldItems, calendarItems);
        renderCalendar();
        updateLastUpdated();

        lastCalendarHash = generateHash(calendarItems);
        setCache("calendar", calendarItems);
      } catch (err) {
        console.log("refresh error:", err);
        if (showOverlay) alert("更新に失敗しました");
      } finally {
        if (showOverlay) setLoading(false);
      }
    }

    async function silentAutoRefresh(fromVisibility = false) {
      if (!autoRefreshEnabled) return;
      if (document.hidden) return;
      if (isUpdatingStatus) return;

      try {
        const oldItems = deepClone(calendarItems);
        await loadCalendar(false);

        const newHash = generateHash(calendarItems);
        if (newHash === lastCalendarHash) return;

        const newCount = detectNewBookings(oldItems, calendarItems);
        renderCalendar();
        updateLastUpdated(true);

        if (newCount > 0 && firstAutoLoadDone && !fromVisibility) {
          showToast(`新しい予約が ${newCount} 件追加されました`);
          playNotificationSound();
        }

        lastCalendarHash = newHash;
        setCache("calendar", calendarItems);
      } catch (e) {
        console.log("auto refresh error", e);
      }
    }

    function restartAutoRefresh() {
      if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
      }

      if (!autoRefreshEnabled) return;

      autoRefreshTimer = setInterval(async () => {
        await silentAutoRefresh(false);
      }, CONFIG.AUTO_REFRESH_MS);
    }

    function updateLiveBadge() {
      const badge = document.getElementById("liveBadge");
      if (!badge) return;

      if (autoRefreshEnabled) {
        badge.textContent = "AUTO更新";
        badge.classList.remove("off");
      } else {
        badge.textContent = "AUTO更新 OFF";
        badge.classList.add("off");
      }
    }

    function switchMode(mode) {
      currentMode = mode;
      syncModeButtons();
      renderCalendar();
    }

    function syncModeButtons() {
      document.getElementById("modeDayBtn").classList.toggle("active", currentMode === "day");
      document.getElementById("modeWeekBtn").classList.toggle("active", currentMode === "week");
      document.getElementById("modeLabel").textContent = currentMode === "day" ? "日表示" : "週表示";
    }

    function fillFilters(keepValues = false) {
      const staffFilter = document.getElementById("staffFilter");
      const serviceFilter = document.getElementById("serviceFilter");

      const prevStaff = keepValues ? staffFilter.value : "";
      const prevService = keepValues ? serviceFilter.value : "";

      staffFilter.innerHTML = `<option value="">全スタッフ</option>`;
      serviceFilter.innerHTML = `<option value="">全サービス</option>`;

      [...staff]
        .sort((a, b) => String(a.name || "").localeCompare(String(b.name || "")))
        .forEach(member => {
          const option = document.createElement("option");
          option.value = member.name;
          option.textContent = member.name;
          staffFilter.appendChild(option);
        });

      [...services]
        .sort((a, b) => String(a.name || "").localeCompare(String(b.name || "")))
        .forEach(service => {
          const option = document.createElement("option");
          option.value = service.name;
          option.textContent = service.name;
          serviceFilter.appendChild(option);
        });

      if (keepValues) {
        staffFilter.value = prevStaff;
        serviceFilter.value = prevService;
      }
    }

    function renderCalendar() {
      const container = document.getElementById("calendarContainer");
      container.innerHTML = "";
      container.classList.remove("grid-layout");

      const selectedDate = document.getElementById("selectedDate").value;
      const staffFilter = document.getElementById("staffFilter").value;
      const serviceFilter = document.getElementById("serviceFilter").value;

      let filtered = [...calendarItems];

      if (currentMode === "day") {
        filtered = filtered.filter(item => item.date === selectedDate);
        document.getElementById("rangeLabel").textContent = `表示範囲: ${formatDayTitle(selectedDate)}`;
      } else {
        const weekDates = getWeekDates(selectedDate);
        filtered = filtered.filter(item => weekDates.includes(item.date));
        document.getElementById("rangeLabel").textContent =
          `表示範囲: ${formatDayTitle(weekDates[0])} - ${formatDayTitle(weekDates[6])}`;
      }

      if (staffFilter) {
        filtered = filtered.filter(item => item.staffName === staffFilter);
      }

      if (serviceFilter) {
        filtered = filtered.filter(item => item.serviceName === serviceFilter);
      }

      filtered.sort((a, b) => {
        const aa = `${a.date} ${a.time}`;
        const bb = `${b.date} ${b.time}`;
        return aa.localeCompare(bb);
      });

      updateSummary(filtered);

      if (!filtered.length) {
        container.innerHTML = `
          <div class="empty-box">
            条件に一致する予約はありません
          </div>
        `;
        return;
      }

      if (window.innerWidth >= 1024 && currentMode === "day") {
        container.classList.add("grid-layout");
      }

      if (currentMode === "day") {
        renderDayView(container, filtered);
      } else {
        renderWeekView(container, filtered, selectedDate);
      }
    }

    function renderDayView(container, items) {
      const grouped = groupByStaff(items);
      const sortedStaff = [...staff].sort((a, b) => String(a.name || "").localeCompare(String(b.name || "")));

      sortedStaff.forEach(member => {
        const bookings = grouped[member.name] || [];
        if (!bookings.length) return;
        container.appendChild(createMasterSection(member, bookings, false));
      });
    }

    function renderWeekView(container, items, selectedDate) {
      const weekDates = getWeekDates(selectedDate);

      weekDates.forEach(date => {
        const itemsForDay = items.filter(item => item.date === date);
        if (!itemsForDay.length) return;

        const dayBlock = document.createElement("section");
        dayBlock.className = "section-day";

        dayBlock.innerHTML = `<div class="day-title">${formatDayTitle(date)}</div>`;

        const grouped = groupByStaff(itemsForDay);
        const sortedStaff = [...staff].sort((a, b) => String(a.name || "").localeCompare(String(b.name || "")));

        sortedStaff.forEach(member => {
          const bookings = grouped[member.name] || [];
          if (!bookings.length) return;
          dayBlock.appendChild(createMasterSection(member, bookings, true));
        });

        container.appendChild(dayBlock);
      });
    }

    function createMasterSection(member, bookings, showDateChip) {
      const section = document.createElement("section");
      section.className = "master-section";

      section.innerHTML = `
        <div class="master-head">
          <img src="${escapeAttr(member.photoUrl || "")}" alt="${escapeAttr(member.name || "")}" class="master-photo" />
          <div>
            <h2 class="master-name">${escapeHtml(member.name || "-")}</h2>
            <p class="master-sub">${escapeHtml(member.startTime || "-")} - ${escapeHtml(member.endTime || "-")}</p>
          </div>
          <div class="master-count">${bookings.length}件</div>
        </div>
        <div class="booking-list">
          ${bookings.map(item => renderBookingCard(item, showDateChip)).join("")}
        </div>
      `;

      bindActionButtons(section, bookings);
      return section;
    }

    function renderBookingCard(item, showDateChip) {
      const isNew = isNewBooking(item);
      const status = normalizeStatus(item.status);
      const statusClass = status === "completed" ? "completed" : status === "cancelled" ? "cancelled" : "booked";
      const cardClass = status === "completed"
        ? "status-completed"
        : status === "cancelled"
          ? "status-cancelled"
          : "";
      const bookingId = getBookingId(item);

      return `
        <div class="booking-card ${isNew ? "new" : ""} ${cardClass}">
          <div class="booking-top">
            <div>
              <div class="booking-time">
                ${escapeHtml(item.time || "-")}
                ${isNew ? `<span class="booking-badge-new">NEW</span>` : ""}
              </div>
              <div class="booking-duration">${escapeHtml(String(item.duration || "-"))}分</div>
            </div>
            <div class="booking-service">${escapeHtml(item.serviceName || "-")}</div>
          </div>

          <div class="booking-row"><span>顧客:</span> ${escapeHtml(item.customerName || "-")}</div>
          <div class="booking-row"><span>電話:</span> ${escapeHtml(item.phone || "-")}</div>

          <div class="booking-footer">
            <div class="booking-status ${statusClass}">${getStatusLabel(status)}</div>
            ${showDateChip ? `<div class="booking-date-chip">${escapeHtml(formatDayTitle(item.date))}</div>` : ``}
          </div>

          <div class="booking-actions">
            ${status !== "completed" ? `
              <button class="action-btn complete"
                type="button"
                data-action="completed"
                data-booking-id="${escapeAttr(bookingId)}">
                完了
              </button>
            ` : ""}

            ${status !== "cancelled" ? `
              <button class="action-btn cancel"
                type="button"
                data-action="cancelled"
                data-booking-id="${escapeAttr(bookingId)}">
                キャンセル
              </button>
            ` : ""}

            ${status !== "booked" ? `
              <button class="action-btn restore"
                type="button"
                data-action="booked"
                data-booking-id="${escapeAttr(bookingId)}">
                予約済みに戻す
              </button>
            ` : ""}
          </div>
        </div>
      `;
    }

    function bindActionButtons(section, bookings) {
      const buttons = section.querySelectorAll(".action-btn");
      buttons.forEach(btn => {
        btn.addEventListener("click", async () => {
          const bookingId = btn.dataset.bookingId;
          const nextStatus = btn.dataset.action;

          const targetBooking = bookings.find(item => getBookingId(item) === bookingId);
          if (!targetBooking) return;

          const confirmText = nextStatus === "completed"
            ? "この予約を完了にしますか？"
            : nextStatus === "cancelled"
              ? "この予約をキャンセルにしますか？"
              : "この予約を予約済みに戻しますか？";

          if (!confirm(confirmText)) return;

          await updateBookingStatus(targetBooking, nextStatus);
        });
      });
    }

    async function updateBookingStatus(booking, nextStatus) {
      if (isUpdatingStatus) return;

      try {
        isUpdatingStatus = true;
        disableActionButtons(true);

        setLoading(true, "更新中...", "予約ステータスを更新しています");

        const payload = {
          mode: "update_status",
          bookingId: getBookingId(booking),
          date: booking.date || "",
          time: booking.time || "",
          customerName: booking.customerName || "",
          staffName: booking.staffName || "",
          serviceName: booking.serviceName || "",
          nextStatus: nextStatus
        };

        const result = await fetchJson(CONFIG.WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        if (result.status !== "success") {
          throw new Error(result.message || "status update failed");
        }

        await refreshAllData(false);
        showToast(getStatusToastText(nextStatus));
      } catch (err) {
        console.log("updateBookingStatus error", err);
        alert("ステータス更新に失敗しました");
      } finally {
        disableActionButtons(false);
        setLoading(false);
        isUpdatingStatus = false;
      }
    }

    function disableActionButtons(disabled) {
      document.querySelectorAll(".action-btn").forEach(btn => {
        btn.disabled = disabled;
      });
    }

    function updateSummary(items) {
      const bookingCount = items.length;
      const uniqueStaff = new Set(items.map(item => item.staffName).filter(Boolean)).size;
      const avg = bookingCount
        ? Math.round(items.reduce((sum, item) => sum + Number(item.duration || 0), 0) / bookingCount)
        : 0;

      document.getElementById("bookingCount").textContent = bookingCount;
      document.getElementById("staffCount").textContent = uniqueStaff;
      document.getElementById("avgDuration").textContent = `${avg}分`;
    }

    function groupByStaff(items) {
      return items.reduce((acc, item) => {
        const key = item.staffName || "Unknown";
        if (!acc[key]) acc[key] = [];
        acc[key].push(item);
        return acc;
      }, {});
    }

    function updateLastUpdated(isAuto = false) {
      const now = new Date();
      const el = document.getElementById("lastUpdated");
      el.textContent = `最終更新: ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

      if (isAuto) {
        el.style.color = "#ffffff";
        el.style.opacity = "1";
        setTimeout(() => {
          el.style.opacity = "0.75";
        }, 1800);
      }
    }

    function renderErrorState(text) {
      document.getElementById("calendarContainer").innerHTML = `
        <div class="empty-box">${escapeHtml(text)}</div>
      `;
    }

    function getToday() {
      return formatDate(new Date());
    }

    function getRelativeDate(offsetDays) {
      const d = new Date();
      d.setDate(d.getDate() + offsetDays);
      return formatDate(d);
    }

    function getWeekDates(dateStr) {
      const date = new Date(dateStr + "T00:00:00");
      const day = date.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      const monday = new Date(date);
      monday.setDate(date.getDate() + diff);

      const result = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        result.push(formatDate(d));
      }
      return result;
    }

    function formatDate(d) {
      const yyyy = d.getFullYear();
      const mm = pad(d.getMonth() + 1);
      const dd = pad(d.getDate());
      return `${yyyy}-${mm}-${dd}`;
    }

    function formatDayTitle(dateStr) {
      const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
      const d = new Date(dateStr + "T00:00:00");
      const mm = pad(d.getMonth() + 1);
      const dd = pad(d.getDate());
      return `${mm}/${dd}（${weekdays[d.getDay()]}）`;
    }

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function deepClone(data) {
      return JSON.parse(JSON.stringify(data));
    }

    function generateHash(data) {
      return JSON.stringify(
        [...data].sort((a, b) => getBookingId(a).localeCompare(getBookingId(b)))
      );
    }

    function getBookingId(item) {
      return [
        item.date || "",
        item.time || "",
        item.staffName || "",
        item.customerName || "",
        item.serviceName || ""
      ].join("|");
    }

    function initializeKnownBookings(items) {
      knownBookingIds = new Set(items.map(getBookingId));
    }

    function detectNewBookings(oldItems, newItems) {
      const oldMap = new Map(oldItems.map(item => [getBookingId(item), item]));
      const nextKnown = new Set();
      let newCount = 0;

      newItems.forEach(item => {
        const id = getBookingId(item);
        const oldItem = oldMap.get(id);

        nextKnown.add(id);

        if (!knownBookingIds.has(id)) {
          item.__newUntil = Date.now() + CONFIG.NEW_BADGE_MS;
          newCount++;
        } else if (oldItem && oldItem.__newUntil && Date.now() < oldItem.__newUntil) {
          item.__newUntil = oldItem.__newUntil;
        }
      });

      knownBookingIds = nextKnown;
      return newCount;
    }

    function isNewBooking(item) {
      return !!item.__newUntil && Date.now() < item.__newUntil;
    }

    function normalizeStatus(status) {
      const s = String(status || "").trim().toLowerCase();
      if (s === "completed") return "completed";
      if (s === "cancelled") return "cancelled";
      return "booked";
    }

    function getStatusLabel(status) {
      if (status === "completed") return "完了";
      if (status === "cancelled") return "キャンセル";
      return "予約済み";
    }

    function getStatusToastText(status) {
      if (status === "completed") return "予約を完了にしました";
      if (status === "cancelled") return "予約をキャンセルにしました";
      return "予約を予約済みに戻しました";
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      const text = document.getElementById("toastText");
      const title = toast.querySelector(".toast-title");

      title.textContent = "通知";
      text.textContent = message;
      toast.classList.add("show");

      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 3200);
    }

    function playNotificationSound() {
      if (!audio) return;
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    init();
  </script>
