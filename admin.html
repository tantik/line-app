<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salon Admin Calendar</title>
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay active">
    <div class="loading-card">
      <div class="loading-spinner"></div>
      <div class="loading-title">読み込み中...</div>
      <div class="loading-text">予約データを準備しています</div>
    </div>
  </div>

  <div id="toast" class="toast" aria-live="polite">
    <div class="toast-title">通知</div>
    <div class="toast-text" id="toastText">予約データが更新されました</div>
  </div>

  <div class="app">
    <div class="topbar">
      <div>
        <h1 class="title">予約カレンダー</h1>
        <p class="subtitle">担当者ごとの予約状況を確認できます</p>
      </div>

      <div class="mode-switch">
        <button class="mode-btn active" id="modeDayBtn" type="button">日</button>
        <button class="mode-btn" id="modeWeekBtn" type="button">週</button>
      </div>
    </div>

    <div class="quick-actions">
      <button class="quick-btn primary" type="button" id="todayBtn">今日</button>
      <button class="quick-btn" type="button" id="tomorrowBtn">明日</button>
      <button class="quick-btn" type="button" id="thisWeekBtn">今週</button>
      <button class="quick-btn" type="button" id="refreshBtn">更新</button>
    </div>

    <div class="filters">
      <input type="date" id="selectedDate" class="field" />

      <div class="filter-row">
        <select id="staffFilter" class="select">
          <option value="">全スタッフ</option>
        </select>

        <select id="serviceFilter" class="select">
          <option value="">全サービス</option>
        </select>
      </div>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">予約件数</div>
        <div class="summary-value" id="bookingCount">0</div>
      </div>

      <div class="summary-card">
        <div class="summary-label">稼働スタッフ</div>
        <div class="summary-value" id="staffCount">0</div>
      </div>

      <div class="summary-card">
        <div class="summary-label">平均所要時間</div>
        <div class="summary-value" id="avgDuration">0分</div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-chip accent">今日の表示</div>
      <div class="legend-chip">スタッフ別</div>
      <div class="legend-chip">サービス絞り込み</div>
      <div class="legend-chip info" id="modeLabel">日表示</div>
      <div class="legend-chip done">完了</div>
      <div class="legend-chip cancel">キャンセル</div>
      <div class="legend-chip confirm-pending">未確認</div>
      <div class="legend-chip confirm-ok">確認済み</div>
      <div class="legend-chip confirm-risk">要確認</div>
      <div class="live-badge">AUTO更新</div>
    </div>

    <div class="status-bar">
      <div><span class="status-dot"></span><span id="lastUpdated">最終更新: --</span></div>
      <div id="rangeLabel">表示範囲: --</div>
    </div>

    <div id="calendarContainer">
      <div class="skeleton-section" id="skeletonBlock">
        <div class="skeleton-card">
          <div class="skeleton-line w-40"></div>
          <div class="skeleton-line w-100"></div>
          <div class="skeleton-line w-80"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-line w-30"></div>
          <div class="skeleton-line w-100"></div>
          <div class="skeleton-line w-60"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="./admin.js"></script>
</body>
</html>
