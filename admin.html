<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,viewport-fit=cover"
  />
  <title>Salon Admin | Bookings</title>
  <link rel="stylesheet" href="./admin.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./src/env.js"></script>
  <script src="./src/supabase.js"></script>
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay active">
    <div class="loading-card">
      <div class="spinner"></div>
      <div class="loading-title">読み込み中...</div>
      <div class="loading-text">予約データを準備しています</div>
    </div>
  </div>

  <div class="app-shell">
    <aside class="side-panel">
      <div class="brand-box">
        <div class="brand-badge">Admin</div>
        <h1>予約管理</h1>
        <p>リアルタイムで予約状況を確認できます</p>
      </div>

      <section id="authLoggedOut" class="auth-card">
        <h2>サロン管理者ログイン</h2>
        <p class="muted">
          メールアドレスにログインリンクを送信します
        </p>

        <label class="field-label" for="adminEmail">管理者メール</label>
        <input
          id="adminEmail"
          class="text-input"
          type="email"
          placeholder="owner@example.com"
          autocomplete="email"
        />

        <button id="sendMagicLinkBtn" class="btn btn-primary btn-block">
          ログインリンクを送る
        </button>
      </section>

      <section id="authLoggedIn" class="auth-card hidden">
        <div class="whoami">
          <div class="whoami-label">ログイン中</div>
          <div id="whoAmI" class="whoami-value">-</div>
        </div>

        <div class="tenant-box">
          <div class="whoami-label">サロン / 権限</div>
          <div id="tenantLabel" class="tenant-value">-</div>
        </div>

        <div class="side-actions">
          <button id="refreshBtn" class="btn btn-secondary">更新</button>
          <button id="signOutBtn" class="btn btn-ghost">ログアウト</button>
        </div>
      </section>

      <section class="metrics-grid">
        <div class="metric-card">
          <div class="metric-value" id="metricCount">0</div>
          <div class="metric-label">表示件数</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="metricPending">0</div>
          <div class="metric-label">未確認</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="metricRisk">0</div>
          <div class="metric-label">要確認</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="metricCancelled">0</div>
          <div class="metric-label">キャンセル</div>
        </div>
      </section>

      <section class="legend-card">
        <h3>ステータス</h3>
        <div class="legend-list">
          <div class="legend-item"><span class="legend-dot is-pending"></span> 未確認</div>
          <div class="legend-item"><span class="legend-dot is-confirmed"></span> 確認済み</div>
          <div class="legend-item"><span class="legend-dot is-risk"></span> 要確認</div>
          <div class="legend-item"><span class="legend-dot is-cancelled"></span> キャンセル</div>
          <div class="legend-item"><span class="legend-dot is-completed"></span> 完了</div>
        </div>
      </section>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <div>
          <div class="eyebrow">Salon Bookings</div>
          <h2>Bookings</h2>
          <p class="muted">日 / 週 / 月の切り替えとリアルタイム更新</p>
        </div>
        <div id="lastUpdated" class="last-updated">最終更新: --</div>
      </header>

      <section class="toolbar-card">
        <div class="toolbar-row">
          <div class="view-switch" role="tablist" aria-label="view switch">
            <button class="view-btn is-active" data-view="today">今日</button>
            <button class="view-btn" data-view="day">日</button>
            <button class="view-btn" data-view="week">週</button>
            <button class="view-btn" data-view="month">月</button>
          </div>

          <div class="date-nav">
            <button id="prevRangeBtn" class="icon-btn" aria-label="previous">←</button>
            <button id="jumpTodayBtn" class="btn btn-secondary">今日へ</button>
            <div id="rangeLabel" class="range-label">--</div>
            <button id="nextRangeBtn" class="icon-btn" aria-label="next">→</button>
          </div>
        </div>

        <div class="toolbar-row filters-row">
          <div class="filter-group">
            <label class="field-label" for="selectedDate">基準日</label>
            <input id="selectedDate" class="text-input" type="date" />
          </div>

          <div class="filter-group">
            <label class="field-label" for="staffFilter">担当者</label>
            <select id="staffFilter" class="select-input">
              <option value="">全担当者</option>
            </select>
          </div>

          <div class="filter-group">
            <label class="field-label" for="statusFilter">ステータス</label>
            <select id="statusFilter" class="select-input">
              <option value="">全ステータス</option>
              <option value="pending">未確認</option>
              <option value="confirmed">確認済み</option>
              <option value="risk">要確認</option>
              <option value="cancelled">キャンセル</option>
              <option value="completed">完了</option>
            </select>
          </div>

          <div class="filter-group search-group">
            <label class="field-label" for="searchText">検索</label>
            <input
              id="searchText"
              class="text-input"
              type="text"
              placeholder="名前・電話・サービス・担当者"
            />
          </div>
        </div>
      </section>

      <section class="content-card">
        <div id="bookingsMount"></div>
        <div id="emptyState" class="empty-state hidden">
          条件に一致する予約はありません
        </div>
      </section>
    </main>
  </div>

  <script src="./admin.js"></script>
</body>
</html>
