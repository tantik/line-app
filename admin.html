<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salon Admin | Supabase</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay active">
    <div class="loading-card">
      <div class="spinner"></div>
      <h2>読み込み中...</h2>
      <p>予約データを準備しています</p>
    </div>
  </div>

  <main class="admin-wrap">
    <section class="card auth-card">
      <div class="auth-header">
        <div>
          <span class="pill">Admin</span>
          <h1>予約カレンダー</h1>
          <p class="muted">担当者ごとの予約状況を確認できます</p>
        </div>
        <button id="signOutBtn" class="ghost-btn" type="button">ログアウト</button>
      </div>

      <div id="authLoggedOut">
        <div class="field">
          <label for="adminEmail">管理者メール</label>
          <input id="adminEmail" type="email" placeholder="manager@salon.jp" />
        </div>
        <button id="sendMagicLinkBtn" class="primary-btn" type="button">ログインリンクを送る</button>
      </div>

      <div id="authLoggedIn" class="hidden">
        <div class="auth-summary">
          <strong id="whoAmI">-</strong>
          <span id="tenantLabel" class="muted">-</span>
        </div>
      </div>
    </section>

    <section class="card toolbar">
      <div class="toolbar-row">
        <input id="selectedDate" type="date" />
        <select id="statusFilter">
          <option value="">全ステータス</option>
          <option value="pending">未確認</option>
          <option value="confirmed">確認済み</option>
          <option value="risk">要確認</option>
          <option value="cancelled">キャンセル</option>
          <option value="completed">完了</option>
        </select>
        <input id="searchText" type="text" placeholder="お客様名 / 電話 / サービス" />
        <button id="refreshBtn" class="primary-btn" type="button">更新</button>
      </div>
      <div class="toolbar-row slim">
        <div class="metric"><strong id="metricCount">0</strong><span>予約件数</span></div>
        <div class="metric"><strong id="metricPending">0</strong><span>未確認</span></div>
        <div class="metric"><strong id="metricRisk">0</strong><span>要確認</span></div>
        <div class="metric"><strong id="metricCancelled">0</strong><span>キャンセル</span></div>
      </div>
    </section>

    <section class="card">
      <div class="table-head">
        <h2>予約一覧</h2>
        <span id="lastUpdated" class="muted">最終更新: --</span>
      </div>
      <div id="bookingTable" class="booking-table"></div>
      <div id="emptyState" class="empty-state hidden">条件に一致する予約はありません</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./src/env.js"></script>
  <script src="./src/supabase-client.js"></script>
  <script src="./admin.js"></script>
</body>
</html>
