<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mirawi Demo</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="app">

  <!-- HOME -->
  <section class="screen active" id="home">
    <div class="card">
      <h1>LINE予約デモ</h1>
      <p>サロン予約をもっと簡単に</p>

      <div class="menu">
        <button onclick="goTo('booking')">予約デモ</button>
        <button onclick="goTo('info')">仕組みを見る</button>
        <button onclick="goTo('lead')">相談する</button>
        <button onclick="openAdmin()">管理画面</button>
      </div>
    </div>
  </section>

  <!-- INFO -->
  <section class="screen" id="info">
    <div class="card">
      <h2>この仕組み</h2>
      <ul>
        <li>24時間予約</li>
        <li>LINE確認</li>
        <li>自動リマインド</li>
      </ul>
      <button onclick="goTo('home')">戻る</button>
    </div>
  </section>

  <!-- BOOKING STEP 1 -->
  <section class="screen" id="booking">
    <div class="card">
      <h2>サービス選択</h2>
      <div id="services"></div>

      <h2>担当者</h2>
      <div id="staff"></div>

      <button onclick="nextStep()">次へ</button>
      <button onclick="goTo('home')">戻る</button>
    </div>
  </section>

  <!-- STEP 2 -->
  <section class="screen" id="datetime">
    <div class="card">
      <h2>日時選択</h2>

      <input type="date" id="date"/>

      <div id="times"></div>

      <button onclick="nextStep2()">確認へ</button>
      <button onclick="goTo('booking')">戻る</button>
    </div>
  </section>

  <!-- STEP 3 -->
  <section class="screen" id="confirm">
    <div class="card">
      <h2>確認</h2>

      <div id="summary"></div>

      <input id="name" placeholder="名前"/>
      <input id="phone" placeholder="電話番号"/>

      <button onclick="confirmBooking()">予約する</button>
      <button onclick="goTo('datetime')">戻る</button>
    </div>
  </section>

  <!-- DONE -->
  <section class="screen" id="done">
    <div class="card">
      <h2>予約完了</h2>
      <p>LINEに確認メッセージを送ります</p>

      <div id="doneSummary"></div>

      <button onclick="goTo('home')">ホームへ</button>
      <button onclick="goTo('lead')">相談する</button>
    </div>
  </section>

  <!-- LEAD -->
  <section class="screen" id="lead">
    <div class="card">
      <h2>相談</h2>

      <input id="leadName" placeholder="名前"/>
      <input id="leadSalon" placeholder="店舗名"/>
      <textarea id="leadMsg"></textarea>

      <button onclick="sendLead()">送信</button>
      <button onclick="goTo('home')">戻る</button>
    </div>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
