<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salon Mini App</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">

    <!-- STEP 1 -->
    <section class="screen active" id="bookingStep1">
      <div class="topbar">
        <button class="icon-back" type="button" onclick="goWelcomeLike()">←</button>
        <div class="step-badge">1/3</div>
      </div>

      <h1 class="screen-title">予約</h1>
      <p class="screen-subtitle">サービスと担当者を選択してください</p>

      <div class="section-block">
        <div class="section-header">
          <h2 class="section-title">サービス選択</h2>
        </div>
        <div class="services-scroll" id="servicesList"></div>
      </div>

      <div class="section-block">
        <div class="section-header">
          <h2 class="section-title">担当者選択</h2>
          <button class="text-link" type="button" onclick="clearSelectedStaff()">未選択にする</button>
        </div>
        <div id="staffListStep1" class="staff-grid"></div>
      </div>

      <div class="bottom-bar">
        <button class="primary-btn" type="button" onclick="goStep2()">次へ</button>
      </div>
    </section>

    <!-- STEP 2 -->
    <section class="screen" id="bookingStep2">
      <div class="topbar">
        <button class="icon-back" type="button" onclick="showScreen('bookingStep1')">←</button>
        <div class="step-badge">2/3</div>
      </div>

      <h1 class="screen-title">日時を選択</h1>
      <p class="screen-subtitle">日付・時間・担当者を確認してください</p>

      <div class="section-block">
        <div class="section-header">
          <h2 class="section-title">日付選択</h2>
        </div>
        <div id="dateList" class="date-scroll-grid"></div>
      </div>

      <div class="section-block">
        <div class="section-header">
          <h2 class="section-title">時間選択</h2>
        </div>
        <div id="timeList" class="time-scroll-grid"></div>
      </div>

      <div class="section-block">
        <div class="section-header">
          <h2 class="section-title">対応可能な担当者</h2>
        </div>
        <div id="staffListStep2" class="staff-grid compact"></div>
      </div>

      <div class="summary-floating">
        <div class="summary-line"><span>サービス</span><strong id="liveSummaryService">-</strong></div>
        <div class="summary-line"><span>担当者</span><strong id="liveSummaryStaff">-</strong></div>
        <div class="summary-line"><span>日時</span><strong id="liveSummaryDateTime">-</strong></div>
      </div>

      <div class="bottom-bar">
        <button class="primary-btn" type="button" onclick="goConfirm()">確認へ</button>
      </div>
    </section>

    <!-- CONFIRM -->
    <section class="screen" id="confirm">
      <div class="topbar">
        <button class="icon-back" type="button" onclick="showScreen('bookingStep2')">←</button>
        <div class="step-badge">3/3</div>
      </div>

      <h1 class="screen-title">予約確認</h1>
      <p class="screen-subtitle">内容をご確認ください</p>

      <div class="confirm-hero">
        <div class="confirm-hero-title">ご予約内容</div>
        <div class="confirm-hero-main" id="confirmService">-</div>
        <div class="confirm-hero-sub" id="confirmStaff">-</div>
      </div>

      <div class="summary-card">
        <div class="summary-row">
          <span>📅 日付</span>
          <strong id="confirmDate">-</strong>
        </div>
        <div class="summary-row">
          <span>⏰ 時間</span>
          <strong id="confirmTime">-</strong>
        </div>
      </div>

      <div class="section-block">
        <h2 class="section-title">お客様情報</h2>
        <input id="name" placeholder="名前" />
        <input id="phone" placeholder="電話番号" />
      </div>

      <div class="bottom-bar dual-buttons">
        <button class="secondary-btn" type="button" onclick="showScreen('bookingStep2')">戻る</button>
        <button class="primary-btn" type="button" onclick="submitForm()">予約を確定</button>
      </div>
    </section>

    <!-- SUCCESS -->
    <section class="screen" id="success">
      <div class="success-wrap">
        <div class="success-icon">✓</div>
        <h1 class="screen-title">予約完了</h1>
        <p class="screen-subtitle">ご予約ありがとうございます</p>

        <div class="summary-card">
          <div class="summary-row">
            <span>📅 日付</span>
            <strong id="successDate">-</strong>
          </div>
          <div class="summary-row">
            <span>⏰ 時間</span>
            <strong id="successTime">-</strong>
          </div>
          <div class="summary-row">
            <span>💇 サービス</span>
            <strong id="successService">-</strong>
          </div>
          <div class="summary-row">
            <span>👤 担当</span>
            <strong id="successStaff">-</strong>
          </div>
        </div>

        <div class="success-actions">
          <button class="secondary-btn" type="button" onclick="openInstallLead()">この仕組みを導入したい</button>
          <button class="primary-btn" type="button" onclick="resetAndGoStart()">トップに戻る</button>
        </div>
      </div>
    </section>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./app.js"></script>
</body>
</html>
